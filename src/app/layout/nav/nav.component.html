<nav>
  <div class="nav-container">
    <a routerLink="/" class="logo">Dr.Clash</a>
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-overlay" [class.open]="menuOpen" (click)="closeMenu()">
      <ul class="nav-links" (click)="$event.stopPropagation()">
        <li><a routerLink="/" (click)="closeMenu()" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/features-bug" (click)="closeMenu()" routerLinkActive="active">Features / Bug</a></li>
        <li><a routerLink="/privacy-policy" (click)="closeMenu()" routerLinkActive="active">Privacy Policy</a></li>
        <li><a routerLink="/terms-conditions" (click)="closeMenu()" routerLinkActive="active">Terms & Conditions</a></li>
        @if (auth.user()?.is_admin) {
          <li><a routerLink="/admin" (click)="closeMenu()" routerLinkActive="active">Admin</a></li>
        }
        <li class="nav-cta">
          @if (auth.user()) {
            <div class="nav-user">
              <span class="nav-user-name">{{ auth.user()?.username }}</span>
              <button class="btn btn-primary btn-sm" (click)="logout()">Logout</button>
            </div>
          } @else {
            <a routerLink="/login" (click)="closeMenu()" class="btn btn-primary">Login</a>
          }
        </li>
      </ul>
    </div>
  </div>
</nav>
